<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>ArcGIS WebMap with Print Components</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      arcgis-map {
        display: block;
        height: 100vh;
        width: 100%;
      }
    </style>
    <!-- Load the ArcGIS Maps SDK for JavaScript (Core, Components, Calcite) -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
  </head>
  <body>
    <!-- Webmap from ArcGIS Online with blue basemap and US state features -->
    <arcgis-map item-id="00ef8417cc744e7da841d445409d29e2">
      <!-- Place the Print component on the top with defaults -->
      <arcgis-print slot="top-right"></arcgis-print>
      <!-- Add the Zoom component -->
      <arcgis-zoom slot="top-left"></arcgis-zoom>
    </arcgis-map>
  </body>
</html>
